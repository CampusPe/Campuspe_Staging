# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy TypeScript API to Azure - campuspe-api-staging

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - ".github/workflows/main_campuspe-api-staging.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies (root-level nuclear fix)
        run: npm ci

      - name: Build TypeScript API (from root with all deps)
        run: |
          echo "🔨 Building TypeScript API from root (nuclear fix)..."
          echo "📦 Installing all dependencies including devDependencies for build..."
          npm ci
          echo "🚀 Starting TypeScript compilation..."
          npm run build
          echo "✅ Build completed. Verifying build artifacts..."
          ls -la apps/api/dist/
          echo "Main entry point: $([ -f apps/api/dist/app.js ] && echo 'app.js EXISTS' || echo 'app.js MISSING')"

      - name: Create optimized deployment package
        run: |
          echo "📦 Creating API deployment package (simplified approach)..."
          mkdir -p deployment-package

          # Copy build artifacts and essential files
          echo "📄 Copying build artifacts and runtime files..."
          cp -r apps/api/dist deployment-package/
          cp package.json deployment-package/
          cp package-lock.json deployment-package/
          cp apps/api/startup.sh deployment-package/
          cp apps/api/web.config deployment-package/

          # Update package.json for deployment (remove build scripts since we have pre-built artifacts)
          echo "⚙️  Updating package.json for deployment..."
          cd deployment-package
          
          # Set the correct start script
          npm pkg set scripts.start="node dist/app.js"
          
          echo "� Installing production dependencies only..."
          npm ci --omit=dev --silent
          cd ..

          # Make scripts executable
          echo "⚙️  Making scripts executable..."
          chmod +x deployment-package/startup.sh

          echo "✅ Deployment package created successfully!"
          echo "📋 Package verification:"
          echo "✓ Build - $([ -f deployment-package/dist/app.js ] && echo 'EXISTS' || echo 'MISSING')"
          echo "✓ Startup Script - $([ -f deployment-package/startup.sh ] && echo 'EXISTS' || echo 'MISSING')"
          echo "✓ Web Config - $([ -f deployment-package/web.config ] && echo 'EXISTS' || echo 'MISSING')"
          echo "✓ Package - $([ -f deployment-package/package.json ] && echo 'EXISTS' || echo 'MISSING')"
          echo "✓ Dependencies - $([ -d deployment-package/node_modules ] && echo 'EXISTS' || echo 'MISSING')"
          echo ""
          echo "📋 Package contents:"
          ls -la deployment-package/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: api-app
          path: deployment-package

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: api-app

      - name: Verify deployment package before deploy
        run: |
          echo "🔍 Verifying API deployment package..."
          ls -la
          echo ""
          echo "📋 Critical files check:"
          echo "✓ Build: $([ -f dist/app.js ] && echo 'EXISTS' || echo 'MISSING')"
          echo "✓ Startup Script: $([ -f startup.sh ] && echo 'EXISTS' || echo 'MISSING')"
          echo "✓ Web Config: $([ -f web.config ] && echo 'EXISTS' || echo 'MISSING')"
          echo "✓ Package: $([ -f package.json ] && echo 'EXISTS' || echo 'MISSING')"
          echo "✓ Dependencies: $([ -d node_modules ] && echo 'EXISTS' || echo 'MISSING')"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8A6DED1EC9FF4D6DBF9BC09565C923D6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6F962B613A624D3582F2985BCDA08CE8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AE3ECD9C02CC4AD296820DF8B2D5C91F }}

      - name: "Deploy to Azure Web App"
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "campuspe-api-staging"
          slot-name: "Production"
          package: .
          clean: true

      - name: Post-deployment verification
        run: |
          echo "🎉 API deployment completed successfully!"
          echo ""
          echo "🌐 API URL: https://campuspe-api-staging-hmfjgud5c6a7exe9.southindia-01.azurewebsites.net"
          echo ""
          echo "📊 Deployment Summary:"
          echo "• Environment: Production"
          echo "• Node.js Version: 20.x"
          echo "• Framework: Express.js + TypeScript"
          echo "• Startup Command: startup.sh"
          echo ""
          echo "🔧 Required Azure Environment Variables:"
          echo "• PORT=8080"
          echo "• NODE_ENV=production"
          echo "• MONGODB_URI=<your-mongodb-connection-string>"
          echo "• JWT_SECRET=<your-jwt-secret>"
          echo "• WEBSITES_ENABLE_APP_SERVICE_STORAGE=false"
          echo ""
          echo "🚨 If the API doesn't start, check:"
          echo "1. Azure Portal → campuspe-api-staging → Log stream"
          echo "2. Ensure all environment variables are set"
          echo "3. Verify startup command is set to: startup.sh"
          echo "4. Test API health: curl https://campuspe-api-staging-hmfjgud5c6a7exe9.southindia-01.azurewebsites.net/api/health"
