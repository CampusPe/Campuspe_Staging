name: Deploy API to Azure App Service

on:
  push:
    branches: [ main ]
    paths: [ 'apps/api/**' ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Install and build API
      working-directory: apps/api
      run: |
        npm ci
        npm run build
        
    - name: Prepare deployment package
      run: |
        mkdir -p deployment-package/apps/api
        
        # Copy built API files
        cp -r apps/api/dist deployment-package/apps/api/
        cp apps/api/package*.json deployment-package/apps/api/
        cp apps/api/startup.sh deployment-package/apps/api/
        cp apps/api/web.config deployment-package/apps/api/
        
        # Copy root package.json and other config files
        cp package.json deployment-package/
        cp .nvmrc deployment-package/
        cp .deployment deployment-package/
        
        # Make startup script executable
        chmod +x deployment-package/apps/api/startup.sh
        
        # Create a simple root startup script
        cat > deployment-package/startup.sh << 'EOF'
        #!/bin/bash
        cd apps/api && npm install --only=production && ./startup.sh
        EOF
        chmod +x deployment-package/startup.sh
    
    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'campuspe-api-staging'
        slot-name: 'production'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: './deployment-package'
